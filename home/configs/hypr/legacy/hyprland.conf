# Star -> Play/Pause
bind = , XF86Favorites, exec, playerctl next # the f12 thingy

# Scissors -> Previous Track
bind = , XF86SelectiveScreenshot, exec, playerctl previous #the f10 thingy


# The f11 (using the raw code 455) 
bind = , code:455, exec, playerctl play-pause #the f11 thingy


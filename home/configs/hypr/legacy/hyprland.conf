#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 10
    gaps_out = 40
    border_size = 3
    col.active_border = rgba(cfcfcfff) rgba(cfcfcfff) 45deg
    col.inactive_border = rgba(00000000)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    active_opacity = 0.9
    inactive_opacity = 0.3
    shadow {
        enabled = true, glow
        range = 25
        render_power = 1000
        color = rgba(cfcfcfff)
        color_inactive = rgba(00000000)
    }
    blur {
        enabled = true, blur
        size = 1
        passes = 5

        vibrancy = 0.1696
    }
}
animations {
    enabled = true, animations
        bezier = winIn, 0.1, 1.0, 0.1, 1.0
        bezier = winOut, 0.1, 1.0, 0.1, 1.0
        bezier = smoothOut, 0.5, 0, 0.99, 0.99
        bezier = layerOut,0.23,1,0.32,1
        animation = windowsIn, 1, 7, winIn, slide
        animation = windowsOut, 1, 3, smoothOut, slide
        animation = windowsMove, 1, 7, winIn, slide
        animation = workspacesIn, 1, 8, winIn, slide
        animation = workspacesOut, 1, 8, winOut, slide
        animation = layersIn, 1, 10, winIn, slide
        animation = layersOut, 1, 3, layerOut, popin 50%
}

dwindle {
    preserve_split = true 
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
}


#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_rules =
    accel_profile = flat
    follow_mouse = 1
    sensitivity = 0.8
    repeat_rate = 50        
    repeat_delay = 200  
    touchpad {
        natural_scroll = true
    }

}

##############################
### WINDOWS AND WORKSPACES ###
##############################
 
windowrule {
    name = xwayland-bridge
    match:class = ^(xwaylandvideobridge)$
    opacity = 0.0 override
    no_anim = on
    no_initial_focus = on
    max_size = 1 1
    no_blur = on
}

windowrule = match:class .*, suppress_event maximize

windowrule {
    name = xwayland-ghost-fix
    match:class = ^$
    match:title = ^$
    match:xwayland = 1
    match:float = 1
    match:fullscreen = 0
    match:pin = 0
    no_focus = on
}
bind = super, f12, submap, clean
submap = clean
bind = super, f12, submap, reset
submap = resetbind = MOD, KEY, submap, clean
submap = clean
bind = super, f12, submap, reset
submap = reset


# Input Method Environment
env = QT_IM_MODULE,fcitx
env = XMODIFIERS,@im=fcitx
env = SDL_IM_MODULE,fcitx
env = GLFW_IM_MODULE,local
# DO NOT ADD GTK_IM_MODULE HERE. Let it be "wayland" by default.

# Fix for Ferdium/Electron apps to use Wayland IME
env = ELECTRON_OZONE_PLATFORM_HINT,wayland


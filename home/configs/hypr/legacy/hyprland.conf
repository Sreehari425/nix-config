### KEYBINDINGS ###
###################
bind = SUPER, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy #dont ask how it work IDK
$mainMod = SUPER 
bindl=,switch:Lid Switch, exec, $hyprlock
bind = $mainMod, return, exec, $terminal
bind = alt, Q, killactive,
bind = $mainMod, M, exit
bind = $mainMod,PERIOD,exec,$emoji
